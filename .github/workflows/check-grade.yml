name: Check grade

on:
  # Respaldo: GitHub puede atrasar o saltarse esto bajo carga de la
  # plataforma (medido: dispara cada ~1h, no cada 5 min — ver
  # docs/SCALING.md#hallazgo-aparte). El auto-encadenado del último paso
  # de abajo es el mecanismo real para el cadencia de 5 min; esto solo
  # reinicia la cadena si se rompió por alguna corrida fallida.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: check-grade
  cancel-in-progress: false

jobs:
  check-grade:
    runs-on: ubuntu-latest
    steps:
      - name: Registrar hora de inicio
        run: echo "JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check-all-users
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: pnpm run check-all

      # El GITHUB_TOKEN por defecto NO puede disparar workflow_dispatch —
      # GitHub lo bloquea a propósito para evitar loops recursivos. Por eso
      # esto necesita un Personal Access Token real guardado como secret
      # (WORKFLOW_DISPATCH_TOKEN). Sin ese secret, este paso simplemente no
      # hace nada y se depende del schedule de respaldo de arriba (~1h).
      # Ver docs/SCALING.md para cómo crear el token.
      # Ciclo normal de 300s (5 min). Mientras INTRALU esté caído (según lo
      # que escribió el step "check" en $GITHUB_OUTPUT, ver
      # check-all-users.js#main), usa un ciclo corto de 60s para detectar la
      # recuperación rápido sin necesitar un chequeo de salud aparte — ver
      # docs/superpowers/specs/2026-07-17-avisos-caida-intralu-design.md,
      # sección "Alternativas consideradas".
      - name: Encadenar la siguiente corrida
        if: always()
        env:
          DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
          INTRALU_DOWN: ${{ steps.check.outputs.intralu_down }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "⚠️ Falta el secret WORKFLOW_DISPATCH_TOKEN — no se encadena la siguiente corrida."
            exit 0
          fi

          ciclo=300
          if [ "$INTRALU_DOWN" = "true" ]; then
            ciclo=60
            echo "INTRALU está caído — usando ciclo corto de ${ciclo}s."
          fi

          elapsed=$(( $(date +%s) - JOB_START ))
          sleep_for=$(( ciclo - elapsed ))
          if [ "$sleep_for" -gt 0 ]; then
            echo "Esperando ${sleep_for}s para completar el ciclo de ${ciclo}s..."
            sleep "$sleep_for"
          fi

          http_code=$(curl -s -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/check-grade.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}")

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "❌ Falló el dispatch (HTTP $http_code):"
            cat /tmp/dispatch_response.json
            exit 1
          fi
          echo "✅ Dispatch OK (HTTP $http_code)."
